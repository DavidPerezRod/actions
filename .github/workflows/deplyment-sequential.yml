name: Deploy Project (sequential)
on: push
jobs:
  test: #nombre del job
    runs-on: ubuntu-latest
    steps:
      - name: Get code # download the code from the repository
        uses: actions/checkout@v3

      - name: Install NodeJS
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
  deploy:
    needs: test # el job deploy depende del job test, se ejecutará después de que el job test termine
    runs-on: ubuntu-latest
    steps:
      - name: Get code # download the code from the repository
        uses: actions/checkout@v3

      - name: Install NodeJS
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm ci
      - name: Build project
        run: npm run build
      - name: Deploy
        run: echo "Deploying project..."
      
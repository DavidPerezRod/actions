name: Events Demo 1
on:
  pull_request:
    types: opened
  workflow_dispatch:
jobs:
  test: #nombre del job
    runs-on: ubuntu-latest
    steps:
      - name: Output event data
        run: echo "${{ toJson(github) }}"        
      - name: Get code
        uses: actions/checkout@v3
      - name: Install dependencies
        run: npm ci
      - name: Test code
        run: npm test
      - name: Build code
        run: npm run build
      - name: Deploy code
        run: echo "Deploying code..."
